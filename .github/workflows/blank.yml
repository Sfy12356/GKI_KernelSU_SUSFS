name: Configure Server

on:
  workflow_dispatch:  # 允许手动触发工作流

jobs:
  configure:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v2

    - name: Set up SSH
      run: |
        mkdir -p ~/.ssh
        echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
        chmod 600 ~/.ssh/id_rsa
        ssh-keyscan ${{ secrets.SSH_HOST }} >> ~/.ssh/known_hosts

    - name: Modify root password
      run: |
        ssh root@${{ secrets.SSH_HOST }} "echo 'root:Wex123' | chpasswd"

    - name: Install and configure frpc
      run: |
        ssh root@${{ secrets.SSH_HOST }} "wget https://github.com/fatedier/frp/releases/download/v0.51.3/frp_0.51.3_linux_amd64.tar.gz"
        ssh root@${{ secrets.SSH_HOST }} "tar -xzf frp_0.51.3_linux_amd64.tar.gz"
        ssh root@${{ secrets.SSH_HOST }} "mv frp_0.51.3_linux_amd64/frpc /usr/local/bin/frpc"
        ssh root@${{ secrets.SSH_HOST }} "chmod +x /usr/local/bin/frpc"
        ssh root@${{ secrets.SSH_HOST }} "echo '[common]
        server_addr = 8.138.113.209
        server_port = 7000
        token = ${{ secrets.FRP_TOKEN }}
        [ssh]
        type = tcp
        local_ip = 127.0.0.1
        local_port = 22
        remote_port = 6000' > /etc/frpc.ini"
        ssh root@${{ secrets.SSH_HOST }} "frpc -c /etc/frpc.ini &"
